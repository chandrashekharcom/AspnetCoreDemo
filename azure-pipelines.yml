# ASP.NET Core Build Pipeline
trigger:
- main

pool:
  name: 'DefaultPool'

variables:
  projectPath: '$(Build.SourcesDirectory)/AspnetCoreDemo/AspnetCoreDemo.csproj'
  buildConfiguration: 'Release'

steps:
- task: UseDotNet@2
  displayName: 'Install .NET SDK'
  inputs:
    packageType: 'sdk'
    version: '8.x' # Match your project version

- task: DotNetCoreCLI@2
  displayName: 'Build Project'
  inputs:
    command: 'build'
    projects: '$(projectPath)'
    arguments: '--configuration $(buildConfiguration)'